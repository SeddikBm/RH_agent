services:
  # ─────────────────────────────────────
  # PostgreSQL — Base de données (standard, sans pgvector)
  # ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hr_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hr_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_agent_pass}
      POSTGRES_DB: ${POSTGRES_DB:-hr_agent_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr_agent} -d ${POSTGRES_DB:-hr_agent_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Backend FastAPI
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr_agent_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./data/chroma_db:/app/chroma_db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-hr_agent}:${POSTGRES_PASSWORD:-hr_agent_pass}@db:5432/${POSTGRES_DB:-hr_agent_db}
      - CHROMA_PERSIST_DIR=/app/chroma_db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────
  # Frontend React (Nginx)
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr_agent_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
